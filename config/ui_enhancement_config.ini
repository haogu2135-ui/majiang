[texture]
filter/mipmap=false
filter/trilinear=false
filter/repeat=false
filter/anisotropic=false
compress/mode=2
compress/lossy_quality=0.7

# ==========================================================
# 云桌麻将 - UI增强配置文件
# Guofeng Mahjong - UI Enhancement Configuration
# ==========================================================
# 本文件存储UI/动画/插画的配置参数，便于统一管理和调整。
# ==========================================================

[general]
; 是否启用高级UI特效 (针对低端设备可关闭)
enable_advanced_ui=true

; 动画速度倍率 (1.0为正常速度)
animation_speed_multiplier=1.0

; 粒子效果质量 (low/medium/high)
particle_quality="high"

; 动态帧率上限
max_fps=60

[particles]
; 胜利特效粒子数量
win_particle_count=64

; 环境粒子数量 (花瓣/落叶等)
ambient_particle_count=20

; 粒子发射速度
particle_emit_speed=1.0

; 粒子生命周期 (秒)
particle_lifetime=2.0

[animations]
; 手牌悬停动画时长 (秒)
hand_hover_duration=0.15

; 卡牌翻转动画时长 (秒)
card_flip_duration=0.3

; 弹窗动画时长 (秒)
popup_duration=0.3

; Toast提示动画时长 (秒)
toast_duration=0.25

; 胜利特效总时长 (秒)
win_effect_duration=2.5

; 结算面板动画时长 (秒)
result_panel_duration=1.0

[illustrations]
; 星光闪烁速度
star_twinkle_speed=1.0

; 祥云飘动速度
cloud_move_speed=20.0

; 竹林摇摆速度
bamboo_sway_speed=1.0

; 梅花飘落速度
blossom_fall_speed=1.0

[colors]
; 粒子颜色饱和度
particle_saturation=0.8

; 粒子颜色亮度
particle_value=0.9

; 动态光效强度
light_effect_intensity=1.0

[performance]
; 同时显示的粒子最大数量
max_concurrent_particles=200

; 动画预加载开关
preload_animations=true

; 对象池大小
object_pool_size=50
